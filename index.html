<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vietnam Festival 2026 名古屋 — 事務局ボランティア・出店申込</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F5F3EF}
  select option{background:#fff;color:#1A1208}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#F0EDE8}
  ::-webkit-scrollbar-thumb{background:#C8B89A;border-radius:2px}
  input::placeholder,textarea::placeholder{color:#B0A090}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin 0.8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const ADMIN_PASS = "vietfes2026";
const API = "/.netlify/functions/api";

const EVENT = {
  nameJa:"ベトナムフェスティバル2026名古屋",
  dates:"2026年12月12日（土）・13日（日）10:00〜19:00",
  venue:"金城ふ頭 Lives NAGOYA／2期用地（野外）",
  access:"あおなみ線「金城ふ頭駅」徒歩5分",
};

const VOL_ROLES = [
  {id:"vol_mgmt", icon:"👥",label:"ボランティア管理",   slots:10,desc:"ボランティアスタッフの取りまとめ・シフト調整・現場サポート"},
  {id:"store_sup",icon:"🏪",label:"出店者サポート",     slots:15,desc:"出店ブースの設営補助・出店者対応・会場内巡回サポート"},
  {id:"planning", icon:"📋",label:"企画・運営サポート",  slots:10,desc:"事前準備・広報補助・企画補助・来場者対応全般"},
];
const VOL_SHIFTS=["12月12日（土）全日 10:00〜19:00","12月13日（日）全日 10:00〜19:00","両日参加 12日・13日"];
const VOL_LANGS =["日本語のみ","日本語・英語","日本語・ベトナム語","日本語・英語・ベトナム語","その他（備考に記載）"];

const BOOTH_CATS=[
  {id:"food",   icon:"🍜",label:"飲食ブース",       price:300000,slots:25,desc:"テント3.6m×2.7m／シンク+手洗い／電源1.5kW"},
  {id:"truck",  icon:"🚐",label:"キッチンカー",     price:250000,slots:5, desc:"車両1台分スペース／電源1.5kW（営業許可書必須）"},
  {id:"goods",  icon:"🛒",label:"食材系・物販ブース",price:250000,slots:15,desc:"テント3.6m×2.7m／机2台・椅子2脚／電源1.0kW"},
  {id:"exhibit",icon:"🏢",label:"展示・PRブース",   price:220000,slots:5, desc:"テント3.6m×2.7m／机2台・椅子2脚／電源1.0kW（物販不可）"},
];

const V_STATUS={pending:{label:"審査中",c:"#D97706",bg:"rgba(217,119,6,0.1)"},confirmed:{label:"確定",c:"#059669",bg:"rgba(5,150,105,0.1)"},waitlist:{label:"補欠",c:"#7C3AED",bg:"rgba(124,58,237,0.1)"},rejected:{label:"不採用",c:"#DC2626",bg:"rgba(220,38,38,0.1)"}};
const B_STATUS={pending:{label:"確認中",c:"#D97706",bg:"rgba(217,119,6,0.1)"},confirmed:{label:"承認",c:"#059669",bg:"rgba(5,150,105,0.1)"},waitlist:{label:"補欠",c:"#7C3AED",bg:"rgba(124,58,237,0.1)"},rejected:{label:"不採用",c:"#DC2626",bg:"rgba(220,38,38,0.1)"}};

const DEFAULT_TAGS=[
  {label:"ベトナム語可",color:"#059669"},{label:"英語可",color:"#2563EB"},
  {label:"経験者",color:"#7C3AED"},{label:"面談済",color:"#D97706"},
  {label:"要フォロー",color:"#DC2626"},{label:"集合案内済",color:"#0891B2"},
  {label:"請求書送付済",color:"#065F46"},{label:"優先対応",color:"#C2410C"},
];

const TEMPLATES=[
  {label:"参加確定",text:"ボランティアへのご応募ありがとうございます。審査の結果、参加が確定しました。詳細は追ってご連絡いたします。"},
  {label:"出店承認",text:"Vietnam Festival 2026名古屋へのご出店申込をいただきありがとうございます。ご出店を承認いたしました。請求書を別途お送りいたします。"},
  {label:"補欠通知",text:"ご応募ありがとうございます。現在補欠となっておりますが、キャンセルが発生した場合は改めてご連絡いたします。"},
  {label:"集合案内",text:"【集合案内】当日は10:00に金城ふ頭Lives NAGOYA入口にお集まりください。動きやすい服装でお越しください。"},
  {label:"終了お礼",text:"本日はVietnam Festival 2026にご協力いただきありがとうございました。皆様のおかげで素晴らしいイベントになりました！"},
];

const C={bg0:"#F5F3EF",bg1:"#FFFFFF",bg2:"#FAFAF8",bg3:"#F0EDE8",border:"#E8E2D8",border2:"#D4C9B8",text:"#1A1208",sub:"#6B5C45",muted:"#A8957E",orange:"#E8700A",orangeD:"#C45C00",green:"#059669",red:"#DC2626",viet:"#DA251D",gold:"#B87A00"};
const inp={width:"100%",background:"#fff",border:"1px solid #D4C9B8",color:"#1A1208",padding:"9px 12px",borderRadius:6,fontSize:13,boxSizing:"border-box",fontFamily:"inherit",boxShadow:"inset 0 1px 3px rgba(0,0,0,0.04)"};

// localStorage（メッセージとタグのみ）
const lstore={get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};

// ─── Root ──────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("public");
  const [vols,setVols]=useState([]);
  const [booths,setBooths]=useState([]);
  const [msgs,setMsgs]=useState({});
  const [tags,setTags]=useState(DEFAULT_TAGS);
  const [toast,setToast]=useState(null);
  const [adminOk,setAdminOk]=useState(false);
  const [adminTab,setAdminTab]=useState("dashboard");
  const [sel,setSel]=useState(null);
  const [loading,setLoading]=useState(false);
  const [setupState,setSetupState]=useState(null); // null|'needed'|'done'

  // メッセージ・タグはlocalStorage
  useEffect(()=>{
    const m=lstore.get('msgs_v2');if(m)setMsgs(m);
    const t=lstore.get('tags_v2');if(t)setTags(t);
  },[]);

  const notify=(msg,err=false)=>{setToast({msg,err});setTimeout(()=>setToast(null),3200);};

  // Notionからデータ取得
  const loadData=async()=>{
    setLoading(true);
    try{
      const [vr,br]=await Promise.all([
        fetch(`${API}?action=fetch&type=vol`).then(r=>r.json()),
        fetch(`${API}?action=fetch&type=booth`).then(r=>r.json()),
      ]);
      if(vr.error==='DB_NOT_CONFIGURED'){setSetupState('needed');setLoading(false);return;}
      setVols(vr.entries||[]);
      setBooths(br.entries||[]);
      setSetupState(null);
    }catch(e){notify('データ取得失敗: '+e.message,true);}
    setLoading(false);
  };

  // 管理画面ログイン時にデータ取得
  useEffect(()=>{if(adminOk)loadData();},[adminOk]);

  // セットアップ（DB作成）
  const runSetup=async()=>{
    setLoading(true);
    try{
      const r=await fetch(`${API}?action=setup`).then(r=>r.json());
      if(r.success){setSetupState({volId:r.VOL_DB_ID,boothId:r.BOOTH_DB_ID});}
      else notify('セットアップ失敗: '+(r.error||'不明なエラー'),true);
    }catch(e){notify('セットアップ失敗: '+e.message,true);}
    setLoading(false);
  };

  // 応募送信
  const addVol=async(data)=>{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'submit',type:'vol',data})}).then(r=>r.json());
    if(r.error)throw new Error(r.error);
    setVols(v=>[r.entry,...v]);
    notify('応募を受け付けました！担当者よりご連絡します');
  };
  const addBooth=async(data)=>{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'submit',type:'booth',data})}).then(r=>r.json());
    if(r.error)throw new Error(r.error);
    setBooths(b=>[r.entry,...b]);
    notify('出店申込を受け付けました！担当者よりご連絡します');
  };

  // ステータス変更
  const changeStatus=async(id,status,type)=>{
    await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update',pageId:id,status,type})});
    const upd=arr=>arr.map(a=>a.id===id?{...a,status}:a);
    if(type==='vol'){setVols(upd);setSel(s=>s?.id===id?{...s,status}:s);}
    else{setBooths(upd);setSel(s=>s?.id===id?{...s,status}:s);}
    const st=type==='vol'?V_STATUS:B_STATUS;
    notify(`ステータスを「${st[status].label}」に変更しました`);
  };

  // タグ付け
  const toggleTag=async(id,tagLabel,type)=>{
    const list=type==='vol'?vols:booths;
    const entry=list.find(a=>a.id===id);
    if(!entry)return;
    const has=entry.tags.includes(tagLabel);
    const newTags=has?entry.tags.filter(t=>t!==tagLabel):[...entry.tags,tagLabel];
    await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update',pageId:id,tags:newTags,type})});
    const upd=arr=>arr.map(a=>a.id===id?{...a,tags:newTags}:a);
    if(type==='vol'){setVols(upd);setSel(s=>s?.id===id?{...s,tags:newTags}:s);}
    else{setBooths(upd);setSel(s=>s?.id===id?{...s,tags:newTags}:s);}
  };

  // タグ作成（ローカル + Notionは使用時に自動生成）
  const createTag=(label,color)=>{
    const nt={label,color};
    const newTags=[...tags,nt];setTags(newTags);lstore.set('tags_v2',newTags);
    notify(`タグ「${label}」を作成しました`);
  };
  const deleteTag=(label)=>{
    const newTags=tags.filter(t=>t.label!==label);setTags(newTags);lstore.set('tags_v2',newTags);
    notify('タグを削除しました');
  };

  // メッセージ（localStorage）
  const sendMsg=(toId,text)=>{
    if(!text.trim())return;
    const m={id:Date.now(),text,at:new Date().toISOString()};
    const nm={...msgs,[toId]:[...(msgs[toId]||[]),m]};
    setMsgs(nm);lstore.set('msgs_v2',nm);notify('送信しました');
  };
  const sendBulk=(text,targets)=>{
    if(!text.trim()||targets.length===0)return;
    const m={id:Date.now(),text,at:new Date().toISOString()};
    const nm={...msgs};targets.forEach(a=>{nm[a.id]=[...(nm[a.id]||[]),m];});
    setMsgs(nm);lstore.set('msgs_v2',nm);notify(`${targets.length}件に一括送信しました`);
  };

  return(
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:C.bg0,minHeight:"100vh",color:C.text}}>
      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.err?C.red:C.green,color:"#fff",padding:"10px 18px",borderRadius:8,fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,0.15)"}}>{toast.msg}</div>}
      <nav style={{background:"#fff",borderBottom:`1px solid ${C.border}`,padding:"0 20px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16}}>🇻🇳</span>
          <span style={{fontWeight:900,fontSize:12,letterSpacing:"0.08em",color:C.gold}}>VIETNAM FESTIVAL</span>
          <span style={{color:C.border2,fontSize:12}}>2026 名古屋</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {view==="admin"&&adminOk&&<button onClick={loadData} style={{background:"transparent",border:`1px solid ${C.border2}`,color:C.sub,padding:"4px 10px",borderRadius:6,fontSize:11,cursor:"pointer"}}>🔄 更新</button>}
          <button onClick={()=>{setView(v=>v==="public"?"admin":"public");setSel(null);}} style={{background:view==="admin"?C.orange:"transparent",border:`1px solid ${C.border2}`,color:view==="admin"?"#fff":C.sub,padding:"5px 14px",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:700}}>
            {view==="admin"?"← 募集ページ":"管理画面"}
          </button>
        </div>
      </nav>
      {view==="public"
        ?<PublicPage vols={vols} booths={booths} addVol={addVol} addBooth={addBooth}/>
        :<AdminPage vols={vols} booths={booths} msgs={msgs} tags={tags} adminOk={adminOk} setAdminOk={setAdminOk} adminTab={adminTab} setAdminTab={setAdminTab} sel={sel} setSel={setSel} loading={loading} setupState={setupState} runSetup={runSetup} changeStatus={changeStatus} toggleTag={toggleTag} createTag={createTag} deleteTag={deleteTag} sendMsg={sendMsg} sendBulk={sendBulk}/>
      }
    </div>
  );
}

// ─── PublicPage ────────────────────────────────────────────────
function PublicPage({vols,booths,addVol,addBooth}){
  const [tab,setTab]=useState("vol");
  return(
    <div style={{maxWidth:720,margin:"0 auto",padding:"0 20px 60px"}}>
      <div style={{textAlign:"center",padding:"40px 0 24px"}}>
        <div style={{fontSize:36,marginBottom:8}}>🇻🇳</div>
        <div style={{display:"inline-block",background:"rgba(218,37,29,0.08)",border:"1px solid rgba(218,37,29,0.25)",color:C.viet,padding:"4px 14px",borderRadius:20,fontSize:11,fontWeight:800,letterSpacing:"0.14em",marginBottom:14}}>RECRUIT 2026</div>
        <h1 style={{fontSize:"clamp(18px,4.5vw,30px)",fontWeight:900,lineHeight:1.25,marginBottom:8}}>{EVENT.nameJa}</h1>
        <div style={{color:C.sub,fontSize:13,display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
          <span>📅 {EVENT.dates}</span><span>📍 {EVENT.venue}</span>
        </div>
        <div style={{color:C.muted,fontSize:12,marginTop:6}}>{EVENT.access} ／ 来場予想 3万人</div>
      </div>
      <div style={{display:"flex",marginBottom:28,border:`1px solid ${C.border2}`,borderRadius:8,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <button onClick={()=>setTab("vol")} style={{flex:1,padding:"11px",background:tab==="vol"?C.orange:"#fff",border:"none",color:tab==="vol"?"#fff":C.sub,fontWeight:700,fontSize:14,cursor:"pointer"}}>👥 ボランティア応募</button>
        <button onClick={()=>setTab("booth")} style={{flex:1,padding:"11px",background:tab==="booth"?C.orange:"#fff",border:"none",borderLeft:`1px solid ${C.border2}`,color:tab==="booth"?"#fff":C.sub,fontWeight:700,fontSize:14,cursor:"pointer"}}>🏪 出店ブース申込</button>
      </div>
      {tab==="vol"?<VolForm vols={vols} addVol={addVol}/>:<BoothForm booths={booths} addBooth={addBooth}/>}
    </div>
  );
}

function VolForm({vols,addVol}){
  const [form,setForm]=useState({name:"",email:"",phone:"",age:"",role:"",shift:"",lang:"",pr:"",note:""});
  const [done,setDone]=useState(false);const [err,setErr]=useState("");const [sending,setSending]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const confFor=id=>vols.filter(a=>a.role===id&&a.status==="confirmed").length;
  const submit=async()=>{
    if(!form.name||!form.email||!form.role||!form.shift||!form.age){setErr("必須項目（*）をすべて入力してください");return;}
    if(parseInt(form.age)<18){setErr("応募資格は18歳以上です");return;}
    if(form.pr.length<100){setErr(`自己PR文は100文字以上必要です（現在${form.pr.length}文字）`);return;}
    setSending(true);setErr("");
    try{await addVol(form);setDone(true);}catch(e){setErr("送信に失敗しました。しばらくしてから再試行してください。");}
    setSending(false);
  };
  if(done)return(<div style={{textAlign:"center",padding:"48px 20px"}}><div style={{fontSize:48,marginBottom:14}}>🎉</div><h2 style={{color:C.orange,fontSize:20,fontWeight:900,marginBottom:10}}>応募完了！</h2><p style={{color:C.sub,fontSize:14,lineHeight:1.8}}>ご応募ありがとうございます。<br/>事務局よりご連絡のうえ、面談の機会を設ける予定です。</p><button onClick={()=>{setDone(false);setForm({name:"",email:"",phone:"",age:"",role:"",shift:"",lang:"",pr:"",note:""});}} style={{marginTop:22,background:"transparent",border:`1px solid ${C.border2}`,color:C.sub,padding:"8px 20px",borderRadius:6,cursor:"pointer",fontSize:13}}>続けて応募する</button></div>);
  return(
    <div>
      <div style={{background:"#FFF8F0",border:"1px solid #F0D8B8",borderRadius:10,padding:"14px 18px",marginBottom:20}}>
        <div style={{color:C.gold,fontSize:12,fontWeight:800,letterSpacing:"0.1em",marginBottom:8}}>【募集要項】</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:12,color:C.sub}}>
          <span>✓ 18歳以上（国籍不問）</span><span>✓ ベトナム語・英語話せる方優先</span><span>✓ 勉強中の方も大歓迎</span><span>✓ 自己PR文100文字以上</span>
        </div>
      </div>
      <div style={{color:C.muted,fontSize:11,fontWeight:800,letterSpacing:"0.14em",marginBottom:10}}>VOLUNTEER ROLES</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:24}}>
        {VOL_ROLES.map(r=>{const rem=r.slots-confFor(r.id);const full=rem<=0;return(<div key={r.id} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",opacity:full?0.5:1,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{fontSize:22}}>{r.icon}</span><span style={{fontSize:11,fontWeight:800,color:full?C.red:C.green}}>{full?"FULL":`残り${rem}名`}</span></div><div style={{fontWeight:800,fontSize:13,marginBottom:5}}>{r.label}</div><div style={{color:C.sub,fontSize:11,lineHeight:1.65}}>{r.desc}</div></div>);})}
      </div>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,padding:"24px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:16,fontWeight:900,marginBottom:20}}>事務局ボランティア応募フォーム</div>
        {err&&<div style={{background:"rgba(220,38,38,0.08)",border:"1px solid rgba(220,38,38,0.25)",color:C.red,padding:"10px 14px",borderRadius:6,marginBottom:14,fontSize:13}}>{err}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <FF label="お名前 *" value={form.name} onChange={v=>set("name",v)} ph="山田 太郎"/>
          <FF label="年齢 *（18歳以上）" value={form.age} onChange={v=>set("age",v)} ph="24" type="number"/>
          <FF label="メールアドレス *" value={form.email} onChange={v=>set("email",v)} ph="email@example.com" type="email"/>
          <FF label="電話番号" value={form.phone} onChange={v=>set("phone",v)} ph="090-0000-0000"/>
          <FS label="希望役割 *" value={form.role} onChange={v=>set("role",v)} opts={VOL_ROLES.map(r=>({v:r.id,l:r.label}))}/>
          <FS label="参加可能日 *" value={form.shift} onChange={v=>set("shift",v)} opts={VOL_SHIFTS.map(s=>({v:s,l:s}))}/>
          <div style={{gridColumn:"1/-1"}}><FS label="語学スキル" value={form.lang} onChange={v=>set("lang",v)} opts={VOL_LANGS.map(s=>({v:s,l:s}))}/></div>
          <div style={{gridColumn:"1/-1"}}><FT label={`自己PR * （100文字以上・現在${form.pr.length}文字）`} value={form.pr} onChange={v=>set("pr",v)} ph="ベトナム文化に興味を持ったきっかけ、経験、意気込みなどをご記入ください"/></div>
          <div style={{gridColumn:"1/-1"}}><FT label="その他・質問（任意）" value={form.note} onChange={v=>set("note",v)} ph="ご質問等があればご記載ください"/></div>
        </div>
        <button onClick={submit} disabled={sending} style={{marginTop:18,width:"100%",background:sending?"#ccc":`linear-gradient(135deg,${C.orange},${C.orangeD})`,border:"none",color:"#fff",padding:"13px",borderRadius:8,fontSize:15,fontWeight:900,cursor:sending?"not-allowed":"pointer"}}>
          {sending?<><span className="spin">⏳</span> 送信中...</>:"応募する →"}
        </button>
        <p style={{textAlign:"center",color:C.muted,fontSize:11,marginTop:10}}>応募後、事務局よりご連絡のうえ面談を設ける予定です</p>
      </div>
    </div>
  );
}

function BoothForm({booths,addBooth}){
  const [form,setForm]=useState({company:"",name:"",email:"",phone:"",cat:"",content:"",note:""});
  const [done,setDone]=useState(false);const [err,setErr]=useState("");const [sending,setSending]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const remFor=id=>{const cat=BOOTH_CATS.find(c=>c.id===id);if(!cat)return 0;return cat.slots-booths.filter(b=>b.cat===id&&b.status==="confirmed").length;};
  const submit=async()=>{
    if(!form.company||!form.name||!form.email||!form.cat){setErr("必須項目（*）をすべて入力してください");return;}
    setSending(true);setErr("");
    try{await addBooth(form);setDone(true);}catch(e){setErr("送信に失敗しました。しばらくしてから再試行してください。");}
    setSending(false);
  };
  if(done)return(<div style={{textAlign:"center",padding:"48px 20px"}}><div style={{fontSize:48,marginBottom:14}}>🏪</div><h2 style={{color:C.orange,fontSize:20,fontWeight:900,marginBottom:10}}>申込完了！</h2><p style={{color:C.sub,fontSize:14,lineHeight:1.8}}>お申込みありがとうございます。<br/>担当者より折り返しご連絡いたします。</p><button onClick={()=>{setDone(false);setForm({company:"",name:"",email:"",phone:"",cat:"",content:"",note:""});}} style={{marginTop:22,background:"transparent",border:`1px solid ${C.border2}`,color:C.sub,padding:"8px 20px",borderRadius:6,cursor:"pointer",fontSize:13}}>続けて申し込む</button></div>);
  return(
    <div>
      <div style={{color:C.muted,fontSize:11,fontWeight:800,letterSpacing:"0.14em",marginBottom:10}}>BOOTH CATEGORIES</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:10,marginBottom:18}}>
        {BOOTH_CATS.map(c=>{const rem=remFor(c.id);const full=rem<=0;return(<div key={c.id} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",opacity:full?0.5:1,boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}><span style={{fontSize:22}}>{c.icon}</span><div style={{textAlign:"right"}}><div style={{fontSize:11,fontWeight:800,color:full?C.red:C.green}}>{full?"満枠":`残り${rem}枠`}</div><div style={{fontSize:12,fontWeight:800,color:C.gold}}>¥{c.price.toLocaleString()}</div></div></div><div style={{fontWeight:800,fontSize:13,marginBottom:5}}>{c.label}</div><div style={{color:C.sub,fontSize:11,lineHeight:1.65}}>{c.desc}</div></div>);})}
      </div>
      <div style={{color:C.sub,fontSize:11,marginBottom:18,padding:"10px 14px",background:"#FFF8F0",borderRadius:6,border:"1px solid #F0D8B8"}}>📌 申込締切：<strong style={{color:C.gold}}>2026年8月28日（金）</strong>　お問合せ：info@vietnamfes.net</div>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,padding:"24px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:16,fontWeight:900,marginBottom:20}}>出店ブース申込フォーム</div>
        {err&&<div style={{background:"rgba(220,38,38,0.08)",border:"1px solid rgba(220,38,38,0.25)",color:C.red,padding:"10px 14px",borderRadius:6,marginBottom:14,fontSize:13}}>{err}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{gridColumn:"1/-1"}}><FF label="貴社名・団体名 *" value={form.company} onChange={v=>set("company",v)} ph="○○株式会社 / ベトナム料理○○"/></div>
          <FF label="ご担当者名 *" value={form.name} onChange={v=>set("name",v)} ph="山田 太郎"/>
          <FF label="電話番号" value={form.phone} onChange={v=>set("phone",v)} ph="03-0000-0000"/>
          <div style={{gridColumn:"1/-1"}}><FF label="メールアドレス *" value={form.email} onChange={v=>set("email",v)} ph="email@example.com" type="email"/></div>
          <div style={{gridColumn:"1/-1"}}><FS label="出店カテゴリ *" value={form.cat} onChange={v=>set("cat",v)} opts={BOOTH_CATS.map(c=>({v:c.id,l:`${c.label}（¥${c.price.toLocaleString()}）`}))}/></div>
          <div style={{gridColumn:"1/-1"}}><FT label="出店内容・販売予定商品" value={form.content} onChange={v=>set("content",v)} ph="例：ベトナム料理（フォー・バインミー・生春巻き）の販売"/></div>
          <div style={{gridColumn:"1/-1"}}><FT label="備考・質問（任意）" value={form.note} onChange={v=>set("note",v)} ph="設備に関する質問など"/></div>
        </div>
        <button onClick={submit} disabled={sending} style={{marginTop:18,width:"100%",background:sending?"#ccc":`linear-gradient(135deg,${C.orange},${C.orangeD})`,border:"none",color:"#fff",padding:"13px",borderRadius:8,fontSize:15,fontWeight:900,cursor:sending?"not-allowed":"pointer"}}>
          {sending?<><span className="spin">⏳</span> 送信中...</>:"申込む →"}
        </button>
        <p style={{textAlign:"center",color:C.muted,fontSize:11,marginTop:10}}>申込後、担当者より折り返しご請求書をお送りします</p>
      </div>
    </div>
  );
}

// ─── AdminPage ─────────────────────────────────────────────────
function AdminPage({vols,booths,msgs,tags,adminOk,setAdminOk,adminTab,setAdminTab,sel,setSel,loading,setupState,runSetup,changeStatus,toggleTag,createTag,deleteTag,sendMsg,sendBulk}){
  const [pw,setPw]=useState("");const [pwErr,setPwErr]=useState(false);
  if(!adminOk)return(
    <div style={{maxWidth:340,margin:"80px auto",padding:"0 20px"}}>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,padding:32,textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:32,marginBottom:14}}>🔒</div>
        <div style={{fontWeight:900,fontSize:17,marginBottom:20}}>管理画面</div>
        <input type="password" placeholder="パスワード" value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&(pw===ADMIN_PASS?setAdminOk(true):setPwErr(true))} style={{...inp,marginBottom:10,textAlign:"center"}}/>
        {pwErr&&<p style={{color:C.red,fontSize:12,marginBottom:10}}>パスワードが違います</p>}
        <button onClick={()=>pw===ADMIN_PASS?setAdminOk(true):setPwErr(true)} style={{width:"100%",background:C.orange,border:"none",color:"#fff",padding:"10px",borderRadius:6,fontSize:14,fontWeight:800,cursor:"pointer"}}>ログイン</button>
      </div>
    </div>
  );

  // セットアップ画面
  if(setupState==='needed')return(
    <div style={{maxWidth:480,margin:"60px auto",padding:"0 20px"}}>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,padding:32,textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:36,marginBottom:14}}>⚙️</div>
        <h2 style={{fontSize:18,fontWeight:900,marginBottom:10}}>初回セットアップ</h2>
        <p style={{color:C.sub,fontSize:13,lineHeight:1.7,marginBottom:24}}>Notionにデータベースを作成します。<br/>このボタンは<strong>初回のみ</strong>クリックしてください。</p>
        <button onClick={runSetup} disabled={loading} style={{width:"100%",background:loading?"#ccc":C.orange,border:"none",color:"#fff",padding:"12px",borderRadius:8,fontSize:14,fontWeight:800,cursor:loading?"not-allowed":"pointer"}}>
          {loading?"⏳ 作成中...":"Notionにデータベースを作成する"}
        </button>
      </div>
    </div>
  );

  // セットアップ完了 → 環境変数設定の案内
  if(setupState&&setupState.volId)return(
    <div style={{maxWidth:560,margin:"60px auto",padding:"0 20px"}}>
      <div style={{background:"#fff",border:"1px solid #D1FAE5",borderRadius:12,padding:32,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
        <div style={{fontSize:32,marginBottom:14,textAlign:"center"}}>✅</div>
        <h2 style={{fontSize:18,fontWeight:900,marginBottom:16,textAlign:"center"}}>データベース作成完了！</h2>
        <p style={{color:C.sub,fontSize:13,marginBottom:20}}>以下の2つのIDをNetlifyの環境変数に設定してください。</p>
        <div style={{background:"#F5F3EF",borderRadius:8,padding:16,marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6}}>VOL_DB_ID（ボランティアDB）</div>
          <div style={{fontFamily:"monospace",fontSize:13,wordBreak:"break-all",color:C.text}}>{setupState.volId}</div>
        </div>
        <div style={{background:"#F5F3EF",borderRadius:8,padding:16,marginBottom:20}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6}}>BOOTH_DB_ID（出店DB）</div>
          <div style={{fontFamily:"monospace",fontSize:13,wordBreak:"break-all",color:C.text}}>{setupState.boothId}</div>
        </div>
        <div style={{background:"#FFF8F0",border:"1px solid #F0D8B8",borderRadius:8,padding:14,fontSize:12,color:C.sub,lineHeight:1.7}}>
          <strong>設定手順：</strong><br/>
          1. Netlify管理画面 → Site Settings → Environment variables<br/>
          2. 上記2つのIDを追加<br/>
          3. Deployを再実行（Trigger deploy）<br/>
          4. このページをリロード
        </div>
      </div>
    </div>
  );

  const tabs=[{id:"dashboard",label:"ダッシュボード"},{id:"vols",label:`ボランティア (${vols.length})`},{id:"booths",label:`出店申込 (${booths.length})`},{id:"bulk",label:"一括連絡"},{id:"tagmgmt",label:"🏷 タグ管理"}];

  return(
    <div style={{maxWidth:980,margin:"0 auto",padding:"20px"}}>
      {loading&&<div style={{textAlign:"center",padding:"40px",color:C.sub,fontSize:14}}><span className="spin" style={{fontSize:24}}>⟳</span><br/>Notionからデータを読み込み中...</div>}
      {!loading&&<>
        <div style={{display:"flex",gap:2,marginBottom:20,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
          {tabs.map(t=><button key={t.id} onClick={()=>{setAdminTab(t.id);setSel(null);}} style={{background:"none",border:"none",color:adminTab===t.id?C.orange:C.sub,fontWeight:adminTab===t.id?800:400,fontSize:13,padding:"10px 14px",cursor:"pointer",borderBottom:adminTab===t.id?`2px solid ${C.orange}`:"2px solid transparent",marginBottom:-1,whiteSpace:"nowrap"}}>{t.label}</button>)}
        </div>
        {adminTab==="dashboard" &&<Dashboard vols={vols} booths={booths} tags={tags}/>}
        {adminTab==="vols"      &&<EntryTab entries={vols} msgs={msgs} tags={tags} sel={sel} setSel={setSel} statusMap={V_STATUS} changeStatus={(id,s)=>changeStatus(id,s,"vol")} toggleTag={(id,tl)=>toggleTag(id,tl,"vol")} sendMsg={sendMsg} type="vol" labelMap={VOL_ROLES} catKey="role"/>}
        {adminTab==="booths"    &&<EntryTab entries={booths} msgs={msgs} tags={tags} sel={sel} setSel={setSel} statusMap={B_STATUS} changeStatus={(id,s)=>changeStatus(id,s,"booth")} toggleTag={(id,tl)=>toggleTag(id,tl,"booth")} sendMsg={sendMsg} type="booth" labelMap={BOOTH_CATS} catKey="cat"/>}
        {adminTab==="bulk"      &&<BulkTab vols={vols} booths={booths} tags={tags} sendBulk={sendBulk}/>}
        {adminTab==="tagmgmt"   &&<TagMgmt tags={tags} createTag={createTag} deleteTag={deleteTag} vols={vols} booths={booths}/>}
      </>}
    </div>
  );
}

// ─── Dashboard ─────────────────────────────────────────────────
function Dashboard({vols,booths,tags}){
  const vc=s=>vols.filter(a=>a.status===s).length;
  const bc=s=>booths.filter(a=>a.status===s).length;
  const tc=l=>[...vols,...booths].filter(a=>a.tags&&a.tags.includes(l)).length;
  return(
    <div>
      <div style={{color:C.muted,fontSize:11,fontWeight:800,letterSpacing:"0.12em",marginBottom:10}}>VOLUNTEER</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:20}}>
        {[{l:"総応募",v:vols.length,c:C.orange},{l:"審査中",v:vc("pending"),c:"#D97706"},{l:"確定",v:vc("confirmed"),c:C.green},{l:"補欠",v:vc("waitlist"),c:"#7C3AED"},{l:"不採用",v:vc("rejected"),c:C.red}].map(s=>(
          <div key={s.l} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 12px",textAlign:"center",boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:32,fontWeight:900,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{color:C.sub,fontSize:11,marginTop:5}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:20,boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}>
        {VOL_ROLES.map((r,i)=>{const conf=vols.filter(a=>a.role===r.id&&a.status==="confirmed").length;const tot=vols.filter(a=>a.role===r.id).length;const pct=(conf/r.slots)*100;return(<div key={r.id} style={{padding:"12px 18px",borderBottom:i<VOL_ROLES.length-1?`1px solid ${C.border}`:"none"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}><span>{r.icon} {r.label}</span><span style={{color:C.sub}}>確定 <strong style={{color:C.green}}>{conf}</strong>/{r.slots}名 <span style={{marginLeft:8,color:C.muted}}>応募{tot}</span></span></div><div style={{background:C.bg3,borderRadius:3,height:3,overflow:"hidden"}}><div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:pct>=100?C.green:C.orange,borderRadius:3}}/></div></div>);})}
      </div>
      <div style={{color:C.muted,fontSize:11,fontWeight:800,letterSpacing:"0.12em",marginBottom:10}}>BOOTHS</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:20}}>
        {[{l:"総申込",v:booths.length,c:C.gold},{l:"確認中",v:bc("pending"),c:"#D97706"},{l:"承認",v:bc("confirmed"),c:C.green},{l:"補欠",v:bc("waitlist"),c:"#7C3AED"}].map(s=>(
          <div key={s.l} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 12px",textAlign:"center",boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:32,fontWeight:900,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{color:C.sub,fontSize:11,marginTop:5}}>{s.l}</div>
          </div>
        ))}
      </div>
      {tags.length>0&&(<><div style={{color:C.muted,fontSize:11,fontWeight:800,letterSpacing:"0.12em",marginBottom:10}}>TAG COUNTS</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{tags.map(t=>(<div key={t.label} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",gap:8,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}><span style={{width:8,height:8,borderRadius:"50%",background:t.color,display:"inline-block"}}/><span style={{fontSize:13}}>{t.label}</span><span style={{fontSize:15,fontWeight:900,color:t.color}}>{tc(t.label)}</span></div>))}</div></>)}
    </div>
  );
}

// ─── EntryTab ──────────────────────────────────────────────────
function EntryTab({entries,msgs,tags,sel,setSel,statusMap,changeStatus,toggleTag,sendMsg,type,labelMap,catKey}){
  const [filter,setFilter]=useState({status:"all",cat:"all",tag:"all",q:""});
  const [msgInput,setMsgInput]=useState("");const [tmpl,setTmpl]=useState("");
  const fset=(k,v)=>setFilter(f=>({...f,[k]:v}));
  const filtered=entries.filter(a=>{
    if(filter.status!=="all"&&a.status!==filter.status)return false;
    if(filter.cat!=="all"&&a[catKey]!==filter.cat)return false;
    if(filter.tag!=="all"&&!(a.tags||[]).includes(filter.tag))return false;
    if(filter.q&&!a.name.includes(filter.q)&&!(a.company||"").includes(filter.q)&&!a.email.includes(filter.q))return false;
    return true;
  }).sort((a,b)=>new Date(b.at)-new Date(a.at));
  const doSend=()=>{if(!sel||!msgInput.trim())return;sendMsg(sel.id,msgInput);setMsgInput("");setTmpl("");};
  return(
    <div style={{display:"flex",gap:14,height:"calc(100vh - 160px)"}}>
      <div style={{width:sel?290:"100%",flexShrink:0,display:"flex",flexDirection:"column",minWidth:0}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <input value={filter.q} onChange={e=>fset("q",e.target.value)} placeholder="名前・社名・メール" style={{gridColumn:"1/-1",background:"#fff",border:`1px solid ${C.border2}`,color:C.text,padding:"7px 11px",borderRadius:6,fontSize:12}}/>
          <select value={filter.status} onChange={e=>fset("status",e.target.value)} style={{background:"#fff",border:`1px solid ${C.border2}`,color:C.text,padding:"7px 8px",borderRadius:6,fontSize:12}}>
            <option value="all">全ステータス</option>
            {Object.entries(statusMap).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          <select value={filter.cat} onChange={e=>fset("cat",e.target.value)} style={{background:"#fff",border:`1px solid ${C.border2}`,color:C.text,padding:"7px 8px",borderRadius:6,fontSize:12}}>
            <option value="all">全カテゴリ</option>
            {labelMap.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
          </select>
          <select value={filter.tag} onChange={e=>fset("tag",e.target.value)} style={{gridColumn:"1/-1",background:"#fff",border:`1px solid ${filter.tag==="all"?C.border2:C.gold}`,color:filter.tag==="all"?C.sub:C.gold,padding:"7px 8px",borderRadius:6,fontSize:12,fontWeight:filter.tag!=="all"?700:400}}>
            <option value="all">🏷 タグで絞り込む</option>
            {tags.map(t=><option key={t.label} value={t.label}>{t.label}</option>)}
          </select>
        </div>
        <div style={{color:C.muted,fontSize:11,marginBottom:8}}>{filtered.length}件表示</div>
        <div style={{flex:1,overflowY:"auto"}}>
          {filtered.length===0&&<div style={{textAlign:"center",color:C.muted,padding:40,fontSize:13}}>データなし</div>}
          {filtered.map(a=>{
            const s=statusMap[a.status];const active=sel?.id===a.id;const mc=(msgs[a.id]||[]).length;
            const cat=labelMap.find(r=>r.id===a[catKey]);
            const entryTags=tags.filter(t=>(a.tags||[]).includes(t.label));
            return(<div key={a.id} onClick={()=>setSel(a)} style={{background:active?"#FFF4EC":"#fff",border:`1px solid ${active?C.orange:C.border}`,borderRadius:8,padding:"12px 14px",marginBottom:6,cursor:"pointer",boxShadow:active?"0 2px 8px rgba(232,112,10,0.12)":"0 1px 4px rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{minWidth:0,flex:1}}><div style={{fontWeight:800,fontSize:13,marginBottom:2}}>{type==="booth"?(a.company||a.name):a.name}</div><div style={{color:C.muted,fontSize:11}}>{cat?.icon} {cat?.label}</div></div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0,marginLeft:8}}>
                  <span style={{background:s?.bg,color:s?.c,padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:800}}>{s?.label}</span>
                  {mc>0&&<span style={{background:C.orange,color:"#fff",padding:"1px 7px",borderRadius:8,fontSize:10,fontWeight:800}}>{mc}通</span>}
                </div>
              </div>
              {entryTags.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>{entryTags.map(t=><span key={t.label} style={{background:`${t.color}18`,color:t.color,border:`1px solid ${t.color}44`,padding:"1px 7px",borderRadius:8,fontSize:10,fontWeight:700}}>{t.label}</span>)}</div>}
            </div>);
          })}
        </div>
      </div>
      {sel&&(
        <div style={{flex:1,minWidth:0,background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><div style={{fontWeight:900,fontSize:15}}>{type==="booth"?(sel.company||sel.name):sel.name}</div><div style={{color:C.sub,fontSize:12,marginTop:2}}>{sel.email}{sel.phone&&<> · {sel.phone}</>}</div></div>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:C.sub,fontSize:20,cursor:"pointer",lineHeight:1,padding:0}}>✕</button>
          </div>
          <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.border}`,fontSize:12,color:C.sub}}>
            {type==="vol"?(
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <span>役割: <strong style={{color:C.text}}>{VOL_ROLES.find(r=>r.id===sel.role)?.label}</strong></span>
                <span>参加日: <strong style={{color:C.text}}>{sel.shift}</strong></span>
                {sel.age&&<span>年齢: <strong style={{color:C.text}}>{sel.age}歳</strong></span>}
                {sel.lang&&<span>語学: <strong style={{color:C.text}}>{sel.lang}</strong></span>}
                {sel.pr&&<div style={{width:"100%",marginTop:4,padding:"8px 10px",background:C.bg3,borderRadius:6,lineHeight:1.7,border:`1px solid ${C.border}`}}><span style={{color:C.gold,fontSize:11,fontWeight:800}}>自己PR：</span><span style={{color:C.text}}>{sel.pr}</span></div>}
              </div>
            ):(
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <span>担当: <strong style={{color:C.text}}>{sel.name}</strong></span>
                <span>カテゴリ: <strong style={{color:C.text}}>{BOOTH_CATS.find(c=>c.id===sel.cat)?.label}</strong></span>
                {sel.content&&<div style={{width:"100%"}}>出店内容: <span style={{color:C.text}}>{sel.content}</span></div>}
              </div>
            )}
            {sel.note&&<div style={{marginTop:4}}>備考: <span style={{color:C.text}}>{sel.note}</span></div>}
          </div>
          <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(statusMap).map(([k,v])=><button key={k} onClick={()=>changeStatus(sel.id,k)} style={{background:sel.status===k?v.bg:"transparent",border:`1px solid ${sel.status===k?v.c:C.border2}`,color:sel.status===k?v.c:C.sub,padding:"4px 11px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>{v.label}</button>)}
          </div>
          <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{color:C.sub,fontSize:11,fontWeight:800,letterSpacing:"0.08em",marginBottom:8}}>🏷 タグ</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {tags.map(t=>{const has=(sel.tags||[]).includes(t.label);return(<button key={t.label} onClick={()=>toggleTag(sel.id,t.label)} style={{background:has?`${t.color}18`:"transparent",border:`1px solid ${has?t.color:C.border2}`,color:has?t.color:C.muted,padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:has?800:400,cursor:"pointer"}}>{has?"✓ ":""}{t.label}</button>);})}
              {tags.length===0&&<span style={{color:C.muted,fontSize:12}}>「タグ管理」から作成してください</span>}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 18px"}}>
            {(msgs[sel.id]||[]).length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,paddingTop:20}}>まだメッセージはありません</div>}
            {(msgs[sel.id]||[]).map(m=><div key={m.id} style={{background:C.bg3,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 13px",marginBottom:8,fontSize:13,lineHeight:1.65}}><div>{m.text}</div><div style={{color:C.muted,fontSize:11,marginTop:5}}>{new Date(m.at).toLocaleString("ja-JP")}</div></div>)}
          </div>
          <div style={{padding:"8px 18px 0",display:"flex",gap:5,flexWrap:"wrap"}}>
            {TEMPLATES.map(t=><button key={t.label} onClick={()=>{setMsgInput(t.text);setTmpl(t.label);}} style={{background:tmpl===t.label?"rgba(232,112,10,0.1)":C.bg3,border:`1px solid ${tmpl===t.label?C.orange:C.border2}`,color:tmpl===t.label?C.orange:C.sub,padding:"3px 10px",borderRadius:12,fontSize:11,cursor:"pointer"}}>{t.label}</button>)}
          </div>
          <div style={{padding:"8px 18px 14px",display:"flex",gap:8,alignItems:"flex-end"}}>
            <textarea value={msgInput} onChange={e=>{setMsgInput(e.target.value);setTmpl("");}} placeholder="メッセージを入力..." rows={3} style={{flex:1,background:C.bg2,border:`1px solid ${C.border2}`,color:C.text,padding:"9px 12px",borderRadius:8,fontSize:13,resize:"none",fontFamily:"inherit",lineHeight:1.6}}/>
            <button onClick={doSend} style={{background:C.orange,border:"none",color:"#fff",padding:"10px 15px",borderRadius:8,fontSize:13,fontWeight:800,cursor:"pointer"}}>送信</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BulkTab ───────────────────────────────────────────────────
function BulkTab({vols,booths,tags,sendBulk}){
  const [entType,setEntType]=useState("vol");
  const [mode,setMode]=useState("status");
  const [target,setTarget]=useState("pending");
  const [tagTarget,setTagTarget]=useState("");
  const [text,setText]=useState("");const [tmpl,setTmpl]=useState("");
  const list=entType==="vol"?vols:booths;
  const smap=entType==="vol"?V_STATUS:B_STATUS;
  const targets=mode==="status"?list.filter(a=>target==="all"||a.status===target):tagTarget?list.filter(a=>(a.tags||[]).includes(tagTarget)):[];
  const doSend=()=>{sendBulk(text,targets);setText("");setTmpl("");};
  return(
    <div style={{maxWidth:580}}>
      <div style={{color:C.muted,fontSize:11,fontWeight:800,letterSpacing:"0.14em",marginBottom:14}}>一括メッセージ送信</div>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <div style={{marginBottom:18}}>
          <div style={{color:C.sub,fontSize:12,fontWeight:700,marginBottom:10}}>送信リスト</div>
          <div style={{display:"flex",gap:7}}>{[{v:"vol",l:"ボランティア"},{v:"booth",l:"出店申込"}].map(o=><button key={o.v} onClick={()=>{setEntType(o.v);setTarget("pending");setTagTarget("");}} style={{background:entType===o.v?"rgba(232,112,10,0.1)":"transparent",border:`1px solid ${entType===o.v?C.orange:C.border2}`,color:entType===o.v?C.orange:C.sub,padding:"6px 14px",borderRadius:6,fontSize:13,fontWeight:800,cursor:"pointer"}}>{o.l}</button>)}</div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{color:C.sub,fontSize:12,fontWeight:700,marginBottom:10}}>絞り込み</div>
          <div style={{display:"flex",gap:7,marginBottom:12}}>
            <button onClick={()=>setMode("status")} style={{background:mode==="status"?"rgba(232,112,10,0.1)":"transparent",border:`1px solid ${mode==="status"?C.orange:C.border2}`,color:mode==="status"?C.orange:C.sub,padding:"6px 14px",borderRadius:6,fontSize:13,fontWeight:800,cursor:"pointer"}}>ステータスで絞る</button>
            <button onClick={()=>setMode("tag")} style={{background:mode==="tag"?"rgba(184,122,0,0.1)":"transparent",border:`1px solid ${mode==="tag"?C.gold:C.border2}`,color:mode==="tag"?C.gold:C.sub,padding:"6px 14px",borderRadius:6,fontSize:13,fontWeight:800,cursor:"pointer"}}>🏷 タグで絞る</button>
          </div>
          {mode==="status"&&<div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{[{value:"all",label:"全員"},...Object.entries(smap).map(([k,v])=>({value:k,label:v.label}))].map(opt=><button key={opt.value} onClick={()=>setTarget(opt.value)} style={{background:target===opt.value?"rgba(232,112,10,0.1)":"transparent",border:`1px solid ${target===opt.value?C.orange:C.border2}`,color:target===opt.value?C.orange:C.sub,padding:"5px 13px",borderRadius:6,fontSize:13,fontWeight:800,cursor:"pointer"}}>{opt.label}</button>)}</div>}
          {mode==="tag"&&<div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{tags.length===0?<div style={{color:C.muted,fontSize:12}}>タグがありません</div>:tags.map(t=><button key={t.label} onClick={()=>setTagTarget(t.label)} style={{background:tagTarget===t.label?`${t.color}18`:"transparent",border:`1px solid ${tagTarget===t.label?t.color:C.border2}`,color:tagTarget===t.label?t.color:C.sub,padding:"5px 13px",borderRadius:6,fontSize:13,fontWeight:tagTarget===t.label?800:400,cursor:"pointer"}}>{t.label}</button>)}</div>}
          <div style={{color:C.orange,fontSize:12,marginTop:10,fontWeight:700}}>対象: <strong style={{fontSize:16}}>{targets.length}</strong> 件</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{color:C.sub,fontSize:12,fontWeight:700,marginBottom:8}}>テンプレート</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{TEMPLATES.map(t=><button key={t.label} onClick={()=>{setText(t.text);setTmpl(t.label);}} style={{background:tmpl===t.label?"rgba(232,112,10,0.1)":C.bg3,border:`1px solid ${tmpl===t.label?C.orange:C.border2}`,color:tmpl===t.label?C.orange:C.sub,padding:"4px 11px",borderRadius:12,fontSize:12,cursor:"pointer"}}>{t.label}</button>)}</div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{color:C.sub,fontSize:12,fontWeight:700,marginBottom:8}}>メッセージ内容</div>
          <textarea value={text} onChange={e=>{setText(e.target.value);setTmpl("");}} rows={5} placeholder="メッセージを入力..." style={{width:"100%",background:C.bg2,border:`1px solid ${C.border2}`,color:C.text,padding:"11px 13px",borderRadius:8,fontSize:14,lineHeight:1.7,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>
        <button onClick={doSend} disabled={targets.length===0||!text.trim()} style={{width:"100%",background:targets.length===0||!text.trim()?"#E5E0D8":`linear-gradient(135deg,${C.orange},${C.orangeD})`,border:"none",color:targets.length===0||!text.trim()?C.muted:"#fff",padding:"13px",borderRadius:8,fontSize:14,fontWeight:900,cursor:targets.length===0||!text.trim()?"not-allowed":"pointer"}}>
          {targets.length} 件に送信する →
        </button>
      </div>
    </div>
  );
}

// ─── TagMgmt ───────────────────────────────────────────────────
const TAG_COLORS=["#059669","#2563EB","#7C3AED","#D97706","#DC2626","#0891B2","#B45309","#BE185D","#0F766E","#6366F1"];
function TagMgmt({tags,createTag,deleteTag,vols,booths}){
  const [label,setLabel]=useState("");const [color,setColor]=useState(TAG_COLORS[0]);const [confirm,setConfirm]=useState(null);
  const tc=l=>[...vols,...booths].filter(a=>a.tags&&a.tags.includes(l)).length;
  const doCreate=()=>{if(!label.trim())return;createTag(label.trim(),color);setLabel("");};
  return(
    <div style={{maxWidth:560}}>
      <div style={{color:C.muted,fontSize:11,fontWeight:800,letterSpacing:"0.14em",marginBottom:14}}>タグ管理</div>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,padding:20,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <div style={{color:C.sub,fontSize:12,fontWeight:700,marginBottom:12}}>新規タグ作成</div>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
          <input value={label} onChange={e=>setLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doCreate()} placeholder="タグ名を入力（例：ベトナム語可）" style={{flex:1,...inp}}/>
          <button onClick={doCreate} disabled={!label.trim()} style={{background:label.trim()?C.orange:"#E5E0D8",border:"none",color:label.trim()?"#fff":C.muted,padding:"9px 18px",borderRadius:6,fontSize:13,fontWeight:800,cursor:label.trim()?"pointer":"not-allowed",whiteSpace:"nowrap"}}>作成</button>
        </div>
        <div style={{color:C.sub,fontSize:12,marginBottom:8}}>カラー選択</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {TAG_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:"50%",background:c,border:color===c?"3px solid #333":"3px solid transparent",cursor:"pointer",outline:"none"}}/>)}
        </div>
        {label&&<div style={{marginTop:14}}><div style={{color:C.sub,fontSize:12,marginBottom:6}}>プレビュー</div><span style={{background:`${color}18`,color:color,border:`1px solid ${color}44`,padding:"3px 12px",borderRadius:8,fontSize:13,fontWeight:700}}>{label}</span></div>}
      </div>
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.border}`,color:C.sub,fontSize:12,fontWeight:700}}>タグ一覧 ({tags.length}件)</div>
        {tags.length===0&&<div style={{textAlign:"center",color:C.muted,padding:30,fontSize:13}}>タグがありません</div>}
        {tags.map((t,i)=>(
          <div key={t.label} style={{padding:"12px 18px",borderBottom:i<tags.length-1?`1px solid ${C.border}`:"none",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{width:10,height:10,borderRadius:"50%",background:t.color,display:"inline-block"}}/>
              <span style={{background:`${t.color}18`,color:t.color,border:`1px solid ${t.color}44`,padding:"3px 12px",borderRadius:8,fontSize:13,fontWeight:700}}>{t.label}</span>
              <span style={{color:C.muted,fontSize:12}}>{tc(t.label)} 件</span>
            </div>
            {confirm===t.label
              ?(<div style={{display:"flex",gap:6}}><button onClick={()=>{deleteTag(t.label);setConfirm(null);}} style={{background:"rgba(220,38,38,0.08)",border:`1px solid ${C.red}`,color:C.red,padding:"3px 10px",borderRadius:5,fontSize:12,cursor:"pointer",fontWeight:700}}>削除確認</button><button onClick={()=>setConfirm(null)} style={{background:"transparent",border:`1px solid ${C.border2}`,color:C.sub,padding:"3px 10px",borderRadius:5,fontSize:12,cursor:"pointer"}}>戻る</button></div>)
              :(<button onClick={()=>setConfirm(t.label)} style={{background:"transparent",border:`1px solid ${C.border2}`,color:C.muted,padding:"3px 10px",borderRadius:5,fontSize:12,cursor:"pointer"}}>削除</button>)
            }
          </div>
        ))}
      </div>
    </div>
  );
}

function FF({label,value,onChange,ph,type="text"}){return(<div><label style={{display:"block",color:C.sub,fontSize:11,fontWeight:800,letterSpacing:"0.08em",marginBottom:6}}>{label}</label><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={inp}/></div>);}
function FS({label,value,onChange,opts}){return(<div><label style={{display:"block",color:C.sub,fontSize:11,fontWeight:800,letterSpacing:"0.08em",marginBottom:6}}>{label}</label><select value={value} onChange={e=>onChange(e.target.value)} style={{...inp,color:value?C.text:C.sub}}><option value="">選択してください</option>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>);}
function FT({label,value,onChange,ph}){return(<div><label style={{display:"block",color:C.sub,fontSize:11,fontWeight:800,letterSpacing:"0.08em",marginBottom:6}}>{label}</label><textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} rows={3} style={{...inp,resize:"vertical",lineHeight:1.65}}/></div>);}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
