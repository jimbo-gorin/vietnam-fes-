<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vietnam Festival 2026 名古屋</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#DA251D;--red-d:#A01818;--red-deep:#6B0F0F;
  --yellow:#FFCD00;--yellow-d:#C9A000;
  --black:#0A0200;--white:#FFFFFF;
  --off:#FFF8F0;--gray:#F5F0E8;
  --border:#E8DDD0;--sub:#7A5C45;--muted:#B09880;
}
body{background:var(--off);font-family:system-ui,-apple-system,sans-serif;color:var(--black)}
select option{background:#fff;color:var(--black)}
input::placeholder,textarea::placeholder{color:#C0A890}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

/* ── HERO ── */
.hero{
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  padding:100px 20px 60px;
}
.hero-bg{display:none;}
.hero-overlay{display:none;}
.hero-stars{display:none;}
.hero-content{max-width:640px;}
.hero-badge{
  display:inline-block;background:var(--red);color:#fff;
  padding:5px 16px;border-radius:2px;font-size:10px;font-weight:900;
  letter-spacing:0.2em;margin-bottom:20px;text-transform:uppercase;
}
.hero-flag{font-size:28px;margin-bottom:12px;}
.hero-title{
  font-size:clamp(32px,6vw,64px);font-weight:900;line-height:1.0;
  color:var(--black);letter-spacing:-0.03em;text-transform:uppercase;margin-bottom:10px;
}
.hero-title span{color:var(--red);}
.hero-sub{
  font-size:clamp(13px,2vw,16px);color:var(--sub);
  margin-bottom:28px;letter-spacing:0.03em;
}
.hero-info{
  display:flex;gap:20px;justify-content:center;flex-wrap:wrap;
  margin-bottom:32px;
}
.hero-info-item{
  display:flex;align-items:center;gap:6px;color:var(--sub);font-size:13px;
}
.hero-info-item strong{color:var(--red);}
.countdown{
  display:flex;gap:10px;justify-content:center;margin-bottom:32px;
}
.cd-block{
  background:var(--gray);border:1px solid var(--border);
  padding:10px 14px;border-radius:6px;min-width:64px;text-align:center;
}
.cd-num{font-size:28px;font-weight:900;color:var(--red);line-height:1;}
.cd-label{font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-top:4px;}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{
  background:var(--red);color:#fff;padding:13px 28px;
  border:none;border-radius:4px;font-size:14px;font-weight:900;
  cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;
  transition:transform 0.15s,opacity 0.15s;
}
.btn-primary:hover{transform:translateY(-2px);opacity:0.9;}
.btn-outline{
  background:transparent;color:var(--black);padding:13px 28px;
  border:2px solid var(--border);border-radius:4px;font-size:14px;
  font-weight:700;cursor:pointer;letter-spacing:0.05em;
  transition:all 0.15s;
}
.btn-outline:hover{border-color:var(--red);color:var(--red);}
.scroll-hint{display:none;}
.scroll-arrow{display:none;}

/* ── NAV ── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,2,0,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(218,37,29,0.3);
  padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-flag{font-size:18px;}
.nav-logo-text{font-weight:900;font-size:13px;letter-spacing:0.1em;color:#fff;}
.nav-logo-sub{color:rgba(255,205,0,0.7);font-size:12px;margin-left:4px;}
.nav-btn{
  background:var(--red);color:#fff;border:none;padding:7px 18px;
  border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;
  letter-spacing:0.05em;
}
.nav-btn.active{background:var(--yellow);color:var(--black);}

/* ── SECTIONS ── */
.section{padding:80px 20px;}
.section-inner{max-width:900px;margin:0 auto;}
.section-label{
  display:inline-block;background:var(--red);color:#fff;
  padding:4px 14px;font-size:10px;font-weight:900;letter-spacing:0.2em;
  text-transform:uppercase;margin-bottom:16px;
}
.section-title{
  font-size:clamp(28px,4vw,44px);font-weight:900;line-height:1.1;
  letter-spacing:-0.02em;margin-bottom:8px;
}
.section-title span{color:var(--red);}
.section-desc{color:var(--sub);font-size:15px;line-height:1.8;max-width:600px;}

/* ── ROLES GRID ── */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:40px;}
.role-card{
  position:relative;border-radius:8px;overflow:hidden;
  min-height:200px;cursor:pointer;
}
.role-card-bg{
  position:absolute;inset:0;background:var(--red-deep);
  transition:transform 0.4s;
}
.role-card:hover .role-card-bg{transform:scale(1.05);}
.role-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(10,2,0,0.95) 0%,rgba(106,15,15,0.5) 60%,transparent 100%);
}
.role-card-content{position:relative;z-index:2;padding:20px;height:100%;display:flex;flex-direction:column;justify-content:flex-end;}
.role-card-icon{font-size:28px;margin-bottom:8px;}
.role-card-slots{
  position:absolute;top:16px;right:16px;z-index:2;
  background:var(--yellow);color:var(--black);padding:3px 10px;
  border-radius:2px;font-size:11px;font-weight:900;
}
.role-card-slots.full{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);}
.role-card-title{font-weight:900;font-size:17px;color:#fff;margin-bottom:6px;}
.role-card-desc{color:rgba(255,255,255,0.65);font-size:12px;line-height:1.6;}

/* ── BOOTH CARDS ── */
.booth-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:32px;}
.booth-card{
  background:#fff;border:2px solid var(--border);border-radius:8px;padding:20px;
  transition:border-color 0.15s,transform 0.15s;
}
.booth-card:hover{border-color:var(--red);transform:translateY(-2px);}
.booth-icon{font-size:28px;margin-bottom:10px;}
.booth-title{font-weight:900;font-size:15px;margin-bottom:4px;}
.booth-price{font-size:18px;font-weight:900;color:var(--red);margin-bottom:6px;}
.booth-slots{font-size:12px;color:var(--sub);margin-bottom:8px;}
.booth-desc{font-size:11px;color:var(--muted);line-height:1.6;}

/* ── FORM ── */
.form-section{background:var(--black);padding:80px 20px;}
.form-inner{max-width:720px;margin:0 auto;}
.form-tabs{
  display:flex;margin-bottom:32px;border:2px solid rgba(255,255,255,0.1);
  border-radius:6px;overflow:hidden;
}
.form-tab{
  flex:1;padding:14px;background:transparent;border:none;
  color:rgba(255,255,255,0.5);font-weight:700;font-size:14px;cursor:pointer;
  transition:all 0.2s;
}
.form-tab.active{background:var(--red);color:#fff;}
.form-box{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:32px;
}
.form-box-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:24px;}
.field-label{
  display:block;color:rgba(255,255,255,0.5);font-size:11px;font-weight:800;
  letter-spacing:0.1em;margin-bottom:6px;text-transform:uppercase;
}
.field-input{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
  color:#fff;padding:10px 14px;border-radius:6px;font-size:14px;
  box-sizing:border-box;font-family:inherit;
  transition:border-color 0.2s;
}
.field-input:focus{outline:none;border-color:var(--yellow);}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field-full{grid-column:1/-1;}
.submit-btn{
  width:100%;margin-top:20px;
  background:linear-gradient(135deg,var(--yellow),var(--yellow-d));
  color:var(--black);border:none;padding:15px;border-radius:6px;
  font-size:16px;font-weight:900;cursor:pointer;letter-spacing:0.05em;
  text-transform:uppercase;transition:transform 0.15s,opacity 0.15s;
}
.submit-btn:hover{transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.form-note{text-align:center;color:rgba(255,255,255,0.3);font-size:11px;margin-top:10px;}
.form-error{
  background:rgba(218,37,29,0.15);border:1px solid rgba(218,37,29,0.4);
  color:#ff7070;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px;
}
.req-box{
  background:rgba(255,205,0,0.08);border:1px solid rgba(255,205,0,0.2);
  border-radius:6px;padding:14px 18px;margin-bottom:24px;
}
.req-title{color:var(--yellow);font-size:11px;font-weight:900;letter-spacing:0.1em;margin-bottom:8px;}
.req-items{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,0.6);}

/* ── DONE ── */
.done-box{text-align:center;padding:60px 20px;}
.done-icon{font-size:56px;margin-bottom:16px;}
.done-title{font-size:24px;font-weight:900;color:var(--yellow);margin-bottom:10px;}
.done-desc{color:rgba(255,255,255,0.6);font-size:14px;line-height:1.8;}

/* ── ADMIN ── */
.admin-wrap{max-width:980px;margin:0 auto;padding:20px;}
.admin-tabs{
  display:flex;gap:2px;margin-bottom:20px;
  border-bottom:2px solid rgba(218,37,29,0.2);overflow-x:auto;
}
.admin-tab{
  background:none;border:none;color:var(--sub);font-size:13px;
  padding:10px 14px;cursor:pointer;font-weight:400;
  border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;
}
.admin-tab.active{color:var(--red);font-weight:800;border-bottom-color:var(--red);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px;}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:8px;
  padding:16px 12px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05);
}
.stat-num{font-size:32px;font-weight:900;line-height:1;}
.stat-label{color:var(--sub);font-size:11px;margin-top:5px;}
.entry-card{
  background:#fff;border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;margin-bottom:6px;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);transition:border-color 0.15s;
}
.entry-card.active{border-color:var(--red);background:#FFF8F8;box-shadow:0 2px 8px rgba(218,37,29,0.1);}
.entry-name{font-weight:800;font-size:13px;margin-bottom:2px;}
.entry-sub{color:var(--muted);font-size:11px;}
.status-badge{
  padding:2px 8px;border-radius:10px;font-size:11px;font-weight:800;
}
.detail-panel{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
.detail-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.detail-name{font-weight:900;font-size:16px;}
.detail-email{color:var(--sub);font-size:12px;margin-top:2px;}
.detail-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.tag-chip{
  padding:3px 10px;border-radius:8px;font-size:12px;cursor:pointer;
  transition:all 0.15s;font-weight:400;border:1px solid var(--border);
  color:var(--muted);background:transparent;
}
.tag-chip.active{font-weight:800;}
.msg-bubble{
  background:#FFF5F5;border:1px solid #FFE0E0;border-radius:8px;
  padding:10px 13px;margin-bottom:8px;font-size:13px;line-height:1.65;
}
.msg-time{color:var(--muted);font-size:11px;margin-top:5px;}
.tmpl-btn{
  background:var(--gray);border:1px solid var(--border);color:var(--sub);
  padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;
}
.tmpl-btn.active{background:rgba(218,37,29,0.08);border-color:var(--red);color:var(--red);}
.msg-input{
  flex:1;background:var(--gray);border:1px solid var(--border);color:var(--black);
  padding:9px 12px;border-radius:8px;font-size:13px;resize:none;
  font-family:inherit;line-height:1.6;
}
.send-btn{
  background:var(--red);border:none;color:#fff;padding:10px 15px;
  border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;
}
.bulk-card{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.tag-mgmt-card{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* ── LOGIN ── */
.login-wrap{max-width:340px;margin:80px auto;padding:0 20px;}
.login-card{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:32px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.login-icon{font-size:32px;margin-bottom:14px;}
.login-title{font-weight:900;font-size:17px;margin-bottom:20px;}
.login-input{
  width:100%;background:var(--gray);border:1px solid var(--border);color:var(--black);
  padding:10px 14px;border-radius:6px;font-size:14px;
  box-sizing:border-box;text-align:center;margin-bottom:10px;font-family:inherit;
}
.login-btn{
  width:100%;background:var(--red);border:none;color:#fff;
  padding:10px;border-radius:6px;font-size:14px;font-weight:800;cursor:pointer;
}
.login-hint{color:var(--muted);font-size:11px;margin-top:12px;}
.login-err{color:var(--red);font-size:12px;margin-bottom:10px;}

/* ── SETUP ── */
.setup-wrap{max-width:480px;margin:60px auto;padding:0 20px;}
.setup-card{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:32px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.id-box{
  background:var(--gray);border-radius:8px;padding:14px 16px;margin-bottom:12px;text-align:left;
}
.id-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px;}
.id-val{font-family:monospace;font-size:13px;word-break:break-all;color:var(--black);}
.guide-box{
  background:#FFF8F0;border:1px solid #F0D8B8;border-radius:8px;
  padding:14px;font-size:12px;color:var(--sub);line-height:1.7;text-align:left;
}

/* ── FOOTER ── */
.footer{
  background:var(--black);padding:40px 20px;text-align:center;
  border-top:3px solid var(--red);
}
.footer-flag{font-size:24px;margin-bottom:12px;}
.footer-name{font-weight:900;font-size:14px;color:#fff;letter-spacing:0.1em;margin-bottom:6px;}
.footer-info{color:rgba(255,255,255,0.3);font-size:12px;line-height:1.8;}

/* ── UTIL ── */
.loading{text-align:center;padding:60px;color:var(--sub);font-size:14px;}
.spin{display:inline-block;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{
  position:fixed;top:16px;right:16px;z-index:9999;
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;
  color:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.2);
}
.toast.ok{background:var(--red);}
.toast.err{background:#DC2626;}

@media(max-width:600px){
  .field-grid{grid-template-columns:1fr;}
  .hero-info{flex-direction:column;gap:10px;}
  .countdown{gap:8px;}
  .cd-block{min-width:60px;padding:10px 12px;}
  .cd-num{font-size:26px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const ADMIN_PASS = "vietfes2026";
const API = "/.netlify/functions/api";

const VOL_ROLES=[
  {id:"vol_mgmt", icon:"👥",label:"ボランティア管理",   slots:10,desc:"スタッフの取りまとめ・シフト調整・現場サポート"},

const VOL_SHIFTS=["12月12日（土）9:00〜21:00","12月13日（日）9:00〜21:00","両日参加（12日・13日）9:00〜21:00"];
const VOL_LANGS=["日本語のみ","日本語・英語","日本語・ベトナム語","日本語・英語・ベトナム語","その他（備考に記載）"];
const BOOTH_CATS=[
  {id:"food",   icon:"🍜",label:"飲食ブース",       price:300000,slots:25,desc:"テント3.6m×2.7m／シンク+手洗い／電源1.5kW"},
  {id:"truck",  icon:"🚐",label:"キッチンカー",     price:250000,slots:5, desc:"車両スペース／電源1.5kW（営業許可書必須）"},
  {id:"goods",  icon:"🛒",label:"食材系・物販",     price:250000,slots:15,desc:"テント3.6m×2.7m／机2台・椅子2脚／電源1.0kW"},
  {id:"exhibit",icon:"🏢",label:"展示・PRブース",   price:220000,slots:5, desc:"テント3.6m×2.7m／机2台・椅子2脚（物販不可）"},
];
const V_STATUS={
  pending:  {label:"審査中",c:"#D97706",bg:"rgba(217,119,6,0.1)"},
  confirmed:{label:"確定",  c:"#059669",bg:"rgba(5,150,105,0.1)"},
  waitlist: {label:"補欠",  c:"#7C3AED",bg:"rgba(124,58,237,0.1)"},

};
const B_STATUS={
  pending:  {label:"確認中",c:"#D97706",bg:"rgba(217,119,6,0.1)"},
  confirmed:{label:"承認",  c:"#059669",bg:"rgba(5,150,105,0.1)"},
  waitlist: {label:"補欠",  c:"#7C3AED",bg:"rgba(124,58,237,0.1)"},
  rejected: {label:"不採用",c:"#DC2626",bg:"rgba(220,38,38,0.1)"},
};
const DEFAULT_TAGS=[
  {label:"ベトナム語可",color:"#059669"},{label:"英語可",color:"#2563EB"},
  {label:"経験者",color:"#7C3AED"},{label:"面談済",color:"#D97706"},
  {label:"要フォロー",color:"#DA251D"},{label:"集合案内済",color:"#0891B2"},
  {label:"請求書送付済",color:"#065F46"},{label:"優先対応",color:"#C2410C"},
];
const TEMPLATES=[
  {label:"参加確定",text:"ボランティアへのご応募ありがとうございます。審査の結果、参加が確定しました。詳細は追ってご連絡いたします。"},
  {label:"出店承認",text:"Vietnam Festival 2026名古屋へのご出店申込をいただきありがとうございます。ご出店を承認いたしました。請求書を別途お送りいたします。"},
  {label:"補欠通知",text:"ご応募ありがとうございます。現在補欠となっておりますが、キャンセルが発生した場合は改めてご連絡いたします。"},
  {label:"集合案内",text:"【集合案内】当日は10:00に金城ふ頭Lives NAGOYA入口にお集まりください。動きやすい服装でお越しください。"},
  {label:"終了お礼",text:"本日はVietnam Festival 2026にご協力いただきありがとうございました。皆様のおかげで素晴らしいイベントになりました！"},
];
const lstore={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

// ─── Countdown ────────────────────────────────────────────────
function Countdown(){
  const target=new Date("2026-12-12T10:00:00+09:00");
  const calc=()=>{
    const diff=target-new Date();
    if(diff<=0)return{d:0,h:0,m:0,s:0};
    return{
      d:Math.floor(diff/864e5),
      h:Math.floor((diff%864e5)/36e5),
      m:Math.floor((diff%36e5)/6e4),
      s:Math.floor((diff%6e4)/1e3),
    };
  };
  const [t,setT]=useState(calc());
  useEffect(()=>{const id=setInterval(()=>setT(calc()),1000);return()=>clearInterval(id);},[]);
  const items=[{v:t.d,l:"DAYS"},{v:t.h,l:"HOURS"},{v:t.m,l:"MINS"},{v:t.s,l:"SECS"}];
  return(
    <div className="countdown">
      {items.map(i=>(
        <div key={i.l} className="cd-block">
          <div className="cd-num">{String(i.v).padStart(2,"0")}</div>
          <div className="cd-label">{i.l}</div>
        </div>
      ))}
    </div>
  );
}

// ─── Root ──────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("public");
  const [vols,setVols]=useState([]);
  const [booths,setBooths]=useState([]);
  const [msgs,setMsgs]=useState({});
  const [tags,setTags]=useState(DEFAULT_TAGS);
  const [toast,setToast]=useState(null);
  const [adminOk,setAdminOk]=useState(false);
  const [adminTab,setAdminTab]=useState("dashboard");
  const [sel,setSel]=useState(null);
  const [loading,setLoading]=useState(false);
  const [setupState,setSetupState]=useState(null);

  useEffect(()=>{
    const m=lstore.get('msgs_v2');if(m)setMsgs(m);
    const t=lstore.get('tags_v2');if(t)setTags(t);
  },[]);

  const notify=(msg,err=false)=>{setToast({msg,err});setTimeout(()=>setToast(null),3200);};

  const loadData=async()=>{
    setLoading(true);
    try{
      const [vr,br]=await Promise.all([
        fetch(`${API}?action=fetch&type=vol`).then(r=>r.json()),
        fetch(`${API}?action=fetch&type=booth`).then(r=>r.json()),
      ]);
      if(vr.error==='DB_NOT_CONFIGURED'){setSetupState('needed');setLoading(false);return;}
      setVols(vr.entries||[]);setBooths(br.entries||[]);setSetupState(null);
    }catch(e){notify('データ取得失敗',true);}
    setLoading(false);
  };

  useEffect(()=>{if(adminOk)loadData();},[adminOk]);

  const runSetup=async()=>{
    setLoading(true);
    try{
      const r=await fetch(`${API}?action=setup`).then(r=>r.json());
      if(r.success)setSetupState({volId:r.VOL_DB_ID,boothId:r.BOOTH_DB_ID});
      else notify('セットアップ失敗: '+(r.error||'不明'),true);
    }catch(e){notify('セットアップ失敗',true);}
    setLoading(false);
  };

  const addVol=async(data)=>{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'submit',type:'vol',data})}).then(r=>r.json());
    if(r.error)throw new Error(r.error);
    setVols(v=>[r.entry,...v]);
  };
  const addBooth=async(data)=>{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'submit',type:'booth',data})}).then(r=>r.json());
    if(r.error)throw new Error(r.error);
    setBooths(b=>[r.entry,...b]);
  };
  const changeStatus=async(id,status,type)=>{
    await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update',pageId:id,status,type})});
    const upd=arr=>arr.map(a=>a.id===id?{...a,status}:a);
    if(type==='vol'){setVols(upd);setSel(s=>s?.id===id?{...s,status}:s);}
    else{setBooths(upd);setSel(s=>s?.id===id?{...s,status}:s);}
    const st=type==='vol'?V_STATUS:B_STATUS;
    notify(`「${st[status].label}」に変更しました`);
  };
  const toggleTag=async(id,tagLabel,type)=>{
    const list=type==='vol'?vols:booths;
    const entry=list.find(a=>a.id===id);if(!entry)return;
    const has=entry.tags.includes(tagLabel);
    const newTags=has?entry.tags.filter(t=>t!==tagLabel):[...entry.tags,tagLabel];
    await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update',pageId:id,tags:newTags,type})});
    const upd=arr=>arr.map(a=>a.id===id?{...a,tags:newTags}:a);
    if(type==='vol'){setVols(upd);setSel(s=>s?.id===id?{...s,tags:newTags}:s);}
    else{setBooths(upd);setSel(s=>s?.id===id?{...s,tags:newTags}:s);}
  };
  const createTag=(label,color)=>{
    const nt={label,color};const newTags=[...tags,nt];
    setTags(newTags);lstore.set('tags_v2',newTags);
    notify(`タグ「${label}」を作成しました`);
  };
  const deleteTag=(label)=>{
    const newTags=tags.filter(t=>t.label!==label);setTags(newTags);lstore.set('tags_v2',newTags);
    notify('タグを削除しました');
  };
  const sendMsg=(toId,text)=>{
    if(!text.trim())return;
    const m={id:Date.now(),text,at:new Date().toISOString()};
    const nm={...msgs,[toId]:[...(msgs[toId]||[]),m]};
    setMsgs(nm);lstore.set('msgs_v2',nm);notify('送信しました');
  };
  const sendBulk=(text,targets)=>{
    if(!text.trim()||targets.length===0)return;
    const m={id:Date.now(),text,at:new Date().toISOString()};
    const nm={...msgs};targets.forEach(a=>{nm[a.id]=[...(nm[a.id]||[]),m];});
    setMsgs(nm);lstore.set('msgs_v2',nm);notify(`${targets.length}件に送信しました`);
  };

  const scrollToForm=(tab)=>{
    setView("public");
    setTimeout(()=>{
      const el=document.getElementById("form-section");
      if(el)el.scrollIntoView({behavior:"smooth"});
    },100);
  };

  return(
    <div>
      {toast&&<div className={`toast ${toast.err?"err":"ok"}`}>{toast.msg}</div>}

      {/* NAV */}
      <nav className="nav">
        <div className="nav-logo">
          <span className="nav-logo-flag">🇻🇳</span>
          <span className="nav-logo-text">VIETNAM FESTIVAL</span>
          <span className="nav-logo-sub">2026 名古屋</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {view==="admin"&&adminOk&&<button onClick={loadData} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.6)",padding:"5px 10px",borderRadius:4,fontSize:11,cursor:"pointer"}}>🔄 更新</button>}
          <button className={`nav-btn ${view==="admin"?"active":""}`} onClick={()=>{setView(v=>v==="public"?"admin":"public");setSel(null);}}>
            {view==="admin"?"← 募集ページ":"管理画面"}
          </button>
        </div>
      </nav>

      {view==="public"?<PublicPage vols={vols} booths={booths} addVol={addVol} addBooth={addBooth} notify={notify}/>
       :<AdminPage vols={vols} booths={booths} msgs={msgs} tags={tags} adminOk={adminOk} setAdminOk={setAdminOk} adminTab={adminTab} setAdminTab={setAdminTab} sel={sel} setSel={setSel} loading={loading} setupState={setupState} runSetup={runSetup} changeStatus={changeStatus} toggleTag={toggleTag} createTag={createTag} deleteTag={deleteTag} sendMsg={sendMsg} sendBulk={sendBulk}/>
      }
    </div>
  );
}

        <button onClick={runSetup} disabled={loading} style={{width:"100%",background:loading?"#ccc":"var(--red)",border:"none",color:"#fff",padding:"12px",borderRadius:8,fontSize:14,fontWeight:800,cursor:loading?"not-allowed":"pointer"}}>
          {loading?"⏳ 作成中...":"Notionにデータベースを作成する"}
        </button>
      </div>
    </div>
  );
  if(setupState?.volId)return(
    <div className="setup-wrap" style={{maxWidth:560}}>

      </div>
    </div>
  );

    <div style={{background:"var(--off)",minHeight:"calc(100vh - 56px)",paddingTop:"56px"}}>
      <div className="admin-wrap">
        {loading&&<div className="loading"><span className="spin" style={{fontSize:24}}>⟳</span><br/>Notionから読み込み中...</div>}
        {!loading&&<>
          <div className="admin-tabs">
            {tabs.map(t=><button key={t.id} className={`admin-tab ${adminTab===t.id?"active":""}`} onClick={()=>{setAdminTab(t.id);setSel(null);}}>{t.label}</button>)}
          </div>
          {adminTab==="dashboard"&&<ADashboard vols={vols} booths={booths} tags={tags}/>}
          {adminTab==="vols"     &&<AEntries entries={vols} msgs={msgs} tags={tags} sel={sel} setSel={setSel} statusMap={V_STATUS} changeStatus={(id,s)=>changeStatus(id,s,"vol")} toggleTag={(id,tl)=>toggleTag(id,tl,"vol")} sendMsg={sendMsg} type="vol" labelMap={VOL_ROLES} catKey="role"/>}
          {adminTab==="booths"   &&<AEntries entries={booths} msgs={msgs} tags={tags} sel={sel} setSel={setSel} statusMap={B_STATUS} changeStatus={(id,s)=>changeStatus(id,s,"booth")} toggleTag={(id,tl)=>toggleTag(id,tl,"booth")} sendMsg={sendMsg} type="booth" labelMap={BOOTH_CATS} catKey="cat"/>}
          {adminTab==="bulk"     &&<ABulk vols={vols} booths={booths} tags={tags} sendBulk={sendBulk}/>}
          {adminTab==="tagmgmt"  &&<ATagMgmt tags={tags} createTag={createTag} deleteTag={deleteTag} vols={vols} booths={booths}/>}
        </>}
      </div>
    </div>
  );
}

        {VOL_ROLES.map((r,i)=>{const conf=vols.filter(a=>a.role===r.id&&a.status==="confirmed").length;const tot=vols.filter(a=>a.role===r.id).length;const pct=(conf/r.slots)*100;return(<div key={r.id} style={{padding:"12px 18px",borderBottom:i<VOL_ROLES.length-1?"1px solid var(--border)":"none"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}><span>{r.icon} {r.label}</span><span style={{color:"var(--sub)"}}>確定 <strong style={{color:"#059669"}}>{conf}</strong>/{r.slots}名 <span style={{marginLeft:8,color:"var(--muted)"}}>応募{tot}</span></span></div><div style={{background:"var(--gray)",borderRadius:3,height:4,overflow:"hidden"}}><div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:pct>=100?"#059669":"var(--red)",borderRadius:3}}/></div></div>);})}

          {tags.map(t=><div key={t.label} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",gap:8,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}><span style={{width:8,height:8,borderRadius:"50%",background:t.color,display:"inline-block"}}/><span style={{fontSize:13}}>{t.label}</span><span style={{fontSize:15,fontWeight:900,color:t.color}}>{tc(t.label)}</span></div>)}

function AEntries({entries,msgs,tags,sel,setSel,statusMap,changeStatus,toggleTag,sendMsg,type,labelMap,catKey}){
  const [filter,setFilter]=useState({status:"all",cat:"all",tag:"all",q:""});

  const filtered=entries.filter(a=>{
    if(filter.status!=="all"&&a.status!==filter.status)return false;
    if(filter.cat!=="all"&&a[catKey]!==filter.cat)return false;
    if(filter.tag!=="all"&&!(a.tags||[]).includes(filter.tag))return false;
    if(filter.q&&!a.name.includes(filter.q)&&!(a.company||"").includes(filter.q)&&!a.email.includes(filter.q))return false;
    return true;
  }).sort((a,b)=>new Date(b.at)-new Date(a.at));
  const doSend=()=>{if(!sel||!msgInput.trim())return;sendMsg(sel.id,msgInput);setMsgInput("");setTmpl("");};
  return(
    <div style={{display:"flex",gap:14,height:"calc(100vh - 160px)"}}>
      <div style={{width:sel?290:"100%",flexShrink:0,display:"flex",flexDirection:"column",minWidth:0}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <input value={filter.q} onChange={e=>fset("q",e.target.value)} placeholder="名前・社名・メール" style={{gridColumn:"1/-1",background:"#fff",border:"1px solid var(--border)",color:"var(--black)",padding:"7px 11px",borderRadius:6,fontSize:12}}/>
          <select value={filter.status} onChange={e=>fset("status",e.target.value)} style={{background:"#fff",border:"1px solid var(--border)",padding:"7px 8px",borderRadius:6,fontSize:12}}>
            <option value="all">全ステータス</option>
            {Object.entries(statusMap).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          <select value={filter.cat} onChange={e=>fset("cat",e.target.value)} style={{background:"#fff",border:"1px solid var(--border)",padding:"7px 8px",borderRadius:6,fontSize:12}}>
            <option value="all">全カテゴリ</option>
            {labelMap.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
          </select>
          <select value={filter.tag} onChange={e=>fset("tag",e.target.value)} style={{gridColumn:"1/-1",background:"#fff",border:`1px solid ${filter.tag==="all"?"var(--border)":"var(--red)"}`,color:filter.tag==="all"?"var(--sub)":"var(--red)",padding:"7px 8px",borderRadius:6,fontSize:12,fontWeight:filter.tag!=="all"?700:400}}>
            <option value="all">🏷 タグで絞り込む</option>
            {tags.map(t=><option key={t.label} value={t.label}>{t.label}</option>)}
          </select>
        </div>
        <div style={{color:"var(--muted)",fontSize:11,marginBottom:8}}>{filtered.length}件表示</div>
        <div style={{flex:1,overflowY:"auto"}}>
          {filtered.length===0&&<div style={{textAlign:"center",color:"var(--muted)",padding:40,fontSize:13}}>データなし</div>}
          {filtered.map(a=>{
            const s=statusMap[a.status];const active=sel?.id===a.id;const mc=(msgs[a.id]||[]).length;
            const cat=labelMap.find(r=>r.id===a[catKey]);
            const entryTags=tags.filter(t=>(a.tags||[]).includes(t.label));
            return(
              <div key={a.id} className={`entry-card ${active?"active":""}`} onClick={()=>setSel(a)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{minWidth:0,flex:1}}>
                    <div className="entry-name">{type==="booth"?(a.company||a.name):a.name}</div>
                    <div className="entry-sub">{cat?.icon} {cat?.label}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0,marginLeft:8}}>
                    <span className="status-badge" style={{background:s?.bg,color:s?.c}}>{s?.label}</span>
                    {mc>0&&<span style={{background:"var(--red)",color:"#fff",padding:"1px 7px",borderRadius:8,fontSize:10,fontWeight:800}}>{mc}通</span>}
                  </div>
                </div>
                {entryTags.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>{entryTags.map(t=><span key={t.label} style={{background:`${t.color}18`,color:t.color,border:`1px solid ${t.color}44`,padding:"1px 7px",borderRadius:8,fontSize:10,fontWeight:700}}>{t.label}</span>)}</div>}
              </div>
            );
          })}
        </div>
      </div>
      {sel&&(
        <div className="detail-panel" style={{flex:1,minWidth:0}}>
          <div className="detail-header">
            <div><div className="detail-name">{type==="booth"?(sel.company||sel.name):sel.name}</div><div className="detail-email">{sel.email}{sel.phone&&<> · {sel.phone}</>}</div></div>
            <button className="detail-close" onClick={()=>setSel(null)}>✕</button>
          </div>
          <div style={{padding:"10px 18px",borderBottom:"1px solid var(--border)",fontSize:12,color:"var(--sub)"}}>
            {type==="vol"?(
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <span>役割: <strong style={{color:"var(--black)"}}>{VOL_ROLES.find(r=>r.id===sel.role)?.label}</strong></span>
                <span>参加日: <strong style={{color:"var(--black)"}}>{sel.shift}</strong></span>
                {sel.age&&<span>年齢: <strong style={{color:"var(--black)"}}>{sel.age}歳</strong></span>}
                {sel.lang&&<span>語学: <strong style={{color:"var(--black)"}}>{sel.lang}</strong></span>}
                {sel.pr&&<div style={{width:"100%",marginTop:4,padding:"8px 10px",background:"var(--gray)",borderRadius:6,lineHeight:1.7,border:"1px solid var(--border)"}}><span style={{color:"var(--red)",fontSize:11,fontWeight:800}}>自己PR：</span><span>{sel.pr}</span></div>}
              </div>
            ):(
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <span>担当: <strong style={{color:"var(--black)"}}>{sel.name}</strong></span>
                <span>カテゴリ: <strong style={{color:"var(--black)"}}>{BOOTH_CATS.find(c=>c.id===sel.cat)?.label}</strong></span>
                {sel.content&&<div style={{width:"100%"}}>出店内容: <span style={{color:"var(--black)"}}>{sel.content}</span></div>}
              </div>
            )}
            {sel.note&&<div style={{marginTop:4}}>備考: <span style={{color:"var(--black)"}}>{sel.note}</span></div>}
          </div>
          <div style={{padding:"10px 18px",borderBottom:"1px solid var(--border)",display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(statusMap).map(([k,v])=>(
              <button key={k} onClick={()=>changeStatus(sel.id,k)} style={{background:sel.status===k?v.bg:"transparent",border:`1px solid ${sel.status===k?v.c:"var(--border)"}`,color:sel.status===k?v.c:"var(--sub)",padding:"4px 11px",borderRadius:6,fontSize:12,fontWeight:800,cursor:"pointer"}}>{v.label}</button>
            ))}
          </div>
          <div style={{padding:"10px 18px",borderBottom:"1px solid var(--border)"}}>
            <div style={{color:"var(--sub)",fontSize:11,fontWeight:800,letterSpacing:"0.08em",marginBottom:8}}>🏷 タグ</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {tags.map(t=>{const has=(sel.tags||[]).includes(t.label);return(
                <button key={t.label} className={`tag-chip ${has?"active":""}`} onClick={()=>toggleTag(sel.id,t.label)} style={has?{background:`${t.color}18`,border:`1px solid ${t.color}`,color:t.color}:{}}>{has?"✓ ":""}{t.label}</button>
              );})}
              {tags.length===0&&<span style={{color:"var(--muted)",fontSize:12}}>「タグ管理」から作成してください</span>}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 18px"}}>
            {(msgs[sel.id]||[]).length===0&&<div style={{textAlign:"center",color:"var(--muted)",fontSize:12,paddingTop:20}}>まだメッセージはありません</div>}
            {(msgs[sel.id]||[]).map(m=><div key={m.id} className="msg-bubble"><div>{m.text}</div><div className="msg-time">{new Date(m.at).toLocaleString("ja-JP")}</div></div>)}
          </div>
          <div style={{padding:"8px 18px 0",display:"flex",gap:5,flexWrap:"wrap"}}>
            {TEMPLATES.map(t=><button key={t.label} className={`tmpl-btn ${tmpl===t.label?"active":""}`} onClick={()=>{setMsgInput(t.text);setTmpl(t.label);}}>{t.label}</button>)}
          </div>
          <div style={{padding:"8px 18px 14px",display:"flex",gap:8,alignItems:"flex-end"}}>
            <textarea value={msgInput} onChange={e=>{setMsgInput(e.target.value);setTmpl("");}} placeholder="メッセージを入力..." rows={3} className="msg-input"/>
            <button className="send-btn" onClick={doSend}>送信</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ABulk({vols,booths,tags,sendBulk}){
  const [entType,setEntType]=useState("vol");
  const [mode,setMode]=useState("status");
  const [target,setTarget]=useState("pending");
  const [tagTarget,setTagTarget]=useState("");
  const [text,setText]=useState("");const [tmpl,setTmpl]=useState("");
  const list=entType==="vol"?vols:booths;
  const smap=entType==="vol"?V_STATUS:B_STATUS;
  const targets=mode==="status"?list.filter(a=>target==="all"||a.status===target):tagTarget?list.filter(a=>(a.tags||[]).includes(tagTarget)):[];
  const doSend=async(dest)=>{
    if(dest==="slack"){
      try{
        const r=await fetch("/.netlify/functions/api",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"slack",text})}).then(r=>r.json());
        if(r.success){alert("Slackに送信しました！");setText("");setTmpl("");}
        else alert("Slack送信失敗: "+r.error);
      }catch(e){alert("エラー: "+e.message);}
    } else {
      sendBulk(text,targets);setText("");setTmpl("");
    }
  };
  const btnStyle=(active,color="#DA251D")=>({background:active?`rgba(${color==="#DA251D"?"218,37,29":"184,122,0"},0.1)`:"transparent",border:`1px solid ${active?color:"var(--border)"}`,color:active?color:"var(--sub)",padding:"6px 14px",borderRadius:6,fontSize:13,fontWeight:800,cursor:"pointer"});
  return(
    <div style={{maxWidth:580}}>
      <div style={{color:"var(--muted)",fontSize:11,fontWeight:800,letterSpacing:"0.14em",marginBottom:14}}>一括メッセージ送信</div>
      <div className="bulk-card">
        <div style={{marginBottom:18}}>
          <div style={{color:"var(--sub)",fontSize:12,fontWeight:700,marginBottom:10}}>送信リスト</div>
          <div style={{display:"flex",gap:7}}>{[{v:"vol",l:"ボランティア"},{v:"booth",l:"出店申込"}].map(o=><button key={o.v} onClick={()=>{setEntType(o.v);setTarget("pending");setTagTarget("");}} style={btnStyle(entType===o.v)}>{o.l}</button>)}</div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{color:"var(--sub)",fontSize:12,fontWeight:700,marginBottom:10}}>絞り込み</div>
          <div style={{display:"flex",gap:7,marginBottom:12}}>
            <button onClick={()=>setMode("status")} style={btnStyle(mode==="status")}>ステータスで絞る</button>
            <button onClick={()=>setMode("tag")} style={btnStyle(mode==="tag","#B87A00")}>🏷 タグで絞る</button>
          </div>
          {mode==="status"&&<div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{[{value:"all",label:"全員"},...Object.entries(smap).map(([k,v])=>({value:k,label:v.label}))].map(opt=><button key={opt.value} onClick={()=>setTarget(opt.value)} style={btnStyle(target===opt.value)}>{opt.label}</button>)}</div>}
          {mode==="tag"&&<div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{tags.length===0?<div style={{color:"var(--muted)",fontSize:12}}>タグがありません</div>:tags.map(t=><button key={t.label} onClick={()=>setTagTarget(t.label)} style={{background:tagTarget===t.label?`${t.color}18`:"transparent",border:`1px solid ${tagTarget===t.label?t.color:"var(--border)"}`,color:tagTarget===t.label?t.color:"var(--sub)",padding:"5px 13px",borderRadius:6,fontSize:13,fontWeight:tagTarget===t.label?800:400,cursor:"pointer"}}>{t.label}</button>)}</div>}
          <div style={{color:"var(--red)",fontSize:12,marginTop:10,fontWeight:700}}>対象: <strong style={{fontSize:16}}>{targets.length}</strong> 件</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{color:"var(--sub)",fontSize:12,fontWeight:700,marginBottom:8}}>テンプレート</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{TEMPLATES.map(t=><button key={t.label} className={`tmpl-btn ${tmpl===t.label?"active":""}`} onClick={()=>{setText(t.text);setTmpl(t.label);}}>{t.label}</button>)}</div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{color:"var(--sub)",fontSize:12,fontWeight:700,marginBottom:8}}>メッセージ内容</div>
          <textarea value={text} onChange={e=>{setText(e.target.value);setTmpl("");}} rows={5} placeholder="メッセージを入力..." style={{width:"100%",background:"var(--gray)",border:"1px solid var(--border)",color:"var(--black)",padding:"11px 13px",borderRadius:8,fontSize:14,lineHeight:1.7,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>doSend("slack")} disabled={!text.trim()} style={{flex:1,background:!text.trim()?"var(--gray)":"#4A154B",border:"none",color:!text.trim()?"var(--muted)":"#fff",padding:"13px",borderRadius:8,fontSize:14,fontWeight:900,cursor:!text.trim()?"not-allowed":"pointer"}}>
            💬 Slackに送信
          </button>
          <button onClick={()=>doSend("record")} disabled={targets.length===0||!text.trim()} style={{flex:1,background:targets.length===0||!text.trim()?"var(--gray)":`linear-gradient(135deg,var(--red),#A01818)`,border:"none",color:targets.length===0||!text.trim()?"var(--muted)":"#fff",padding:"13px",borderRadius:8,fontSize:14,fontWeight:900,cursor:targets.length===0||!text.trim()?"not-allowed":"pointer"}}>
            📋 記録に残す ({targets.length}件)
          </button>
        </div>
      </div>
    </div>
  );
}

const TAG_COLORS=["#DA251D","#059669","#2563EB","#7C3AED","#D97706","#0891B2","#B45309","#BE185D","#FFCD00","#6366F1"];
function ATagMgmt({tags,createTag,deleteTag,vols,booths}){
  const [label,setLabel]=useState("");const [color,setColor]=useState(TAG_COLORS[0]);const [confirm,setConfirm]=useState(null);
  const tc=l=>[...vols,...booths].filter(a=>a.tags&&a.tags.includes(l)).length;
  const doCreate=()=>{if(!label.trim())return;createTag(label.trim(),color);setLabel("");};
  return(
    <div style={{maxWidth:560}}>
      <div style={{color:"var(--muted)",fontSize:11,fontWeight:800,letterSpacing:"0.14em",marginBottom:14}}>タグ管理</div>
      <div className="tag-mgmt-card">
        <div style={{color:"var(--sub)",fontSize:12,fontWeight:700,marginBottom:12}}>新規タグ作成</div>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
          <input value={label} onChange={e=>setLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doCreate()} placeholder="タグ名を入力" style={{flex:1,background:"var(--gray)",border:"1px solid var(--border)",color:"var(--black)",padding:"9px 12px",borderRadius:6,fontSize:13,fontFamily:"inherit"}}/>
          <button onClick={doCreate} disabled={!label.trim()} style={{background:label.trim()?"var(--red)":"var(--gray)",border:"none",color:label.trim()?"#fff":"var(--muted)",padding:"9px 18px",borderRadius:6,fontSize:13,fontWeight:800,cursor:label.trim()?"pointer":"not-allowed",whiteSpace:"nowrap"}}>作成</button>
        </div>
        <div style={{color:"var(--sub)",fontSize:12,marginBottom:8}}>カラー</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {TAG_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:28,height:28,borderRadius:"50%",background:c,border:color===c?"3px solid #333":"3px solid transparent",cursor:"pointer",outline:"none"}}/>)}
        </div>
        {label&&<div style={{marginTop:14}}><span style={{background:`${color}18`,color:color,border:`1px solid ${color}44`,padding:"3px 12px",borderRadius:8,fontSize:13,fontWeight:700}}>{label}</span></div>}
      </div>
      <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",color:"var(--sub)",fontSize:12,fontWeight:700}}>タグ一覧 ({tags.length}件)</div>
        {tags.length===0&&<div style={{textAlign:"center",color:"var(--muted)",padding:30,fontSize:13}}>タグがありません</div>}
        {tags.map((t,i)=>(
          <div key={t.label} style={{padding:"12px 18px",borderBottom:i<tags.length-1?"1px solid var(--border)":"none",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{width:10,height:10,borderRadius:"50%",background:t.color,display:"inline-block"}}/>
              <span style={{background:`${t.color}18`,color:t.color,border:`1px solid ${t.color}44`,padding:"3px 12px",borderRadius:8,fontSize:13,fontWeight:700}}>{t.label}</span>
              <span style={{color:"var(--muted)",fontSize:12}}>{tc(t.label)} 件</span>
            </div>
            {confirm===t.label
              ?<div style={{display:"flex",gap:6}}><button onClick={()=>{deleteTag(t.label);setConfirm(null);}} style={{background:"rgba(220,38,38,0.08)",border:"1px solid #DC2626",color:"#DC2626",padding:"3px 10px",borderRadius:5,fontSize:12,cursor:"pointer",fontWeight:700}}>削除確認</button><button onClick={()=>setConfirm(null)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--sub)",padding:"3px 10px",borderRadius:5,fontSize:12,cursor:"pointer"}}>戻る</button></div>
              :<button onClick={()=>setConfirm(t.label)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",padding:"3px 10px",borderRadius:5,fontSize:12,cursor:"pointer"}}>削除</button>
            }
          </div>
        ))}
      </div>
    </div>
  );
}

function FF({label,value,onChange,ph,type="text"}){
  return(<div><label className="field-label">{label}</label><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} className="field-input"/></div>);
}
function FS({label,value,onChange,opts}){
  return(<div><label className="field-label">{label}</label><select value={value} onChange={e=>onChange(e.target.value)} className="field-input" style={{color:value?"#fff":"rgba(255,255,255,0.3)"}}><option value="">選択してください</option>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>);
}
function FT({label,value,onChange,ph}){
  return(<div><label className="field-label">{label}</label><textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} rows={3} className="field-input" style={{resize:"vertical",lineHeight:1.65}}/></div>);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
